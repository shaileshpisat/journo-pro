// ── SEARCH VIEW ───────────────────────────────────────────────────────────────
const SearchView = ({ entries, onSelect }) => {
  const [query, setQuery] = useState('');
  const [filterEntity, setFilterEntity] = useState('');
  const [filterFolder, setFilterFolder] = useState('');
  const [filterTag, setFilterTag] = useState('');
  const [filterFrom, setFilterFrom] = useState('');
  const [filterTo, setFilterTo] = useState('');
  const [filtersOpen, setFiltersOpen] = useState(false);

  const allEntities = [...new Set(entries.filter(e => e.entity).map(e => e.entity))].sort();
  const allFolders = getAllFolderPaths(entries).sort();
  const allTags = [...new Set(entries.flatMap(e => e.tags))].sort();

  const results = entries.filter(e => {
    if (query && !e.text.toLowerCase().includes(query.toLowerCase()) && !(e.entity || '').toLowerCase().includes(query.toLowerCase())) return false;
    if (filterEntity && e.entity !== filterEntity) return false;
    if (filterFolder && !folderMatches(e.folder, filterFolder)) return false;
    if (filterTag && !e.tags.includes(filterTag)) return false;
    if (filterFrom && e.timestamp.slice(0, 10) < filterFrom) return false;
    if (filterTo && e.timestamp.slice(0, 10) > filterTo) return false;
    return true;
  });

  const hasFilters = filterEntity || filterFolder || filterTag || filterFrom || filterTo;
  const activeFilterCount = [filterEntity, filterFolder, filterTag, filterFrom, filterTo].filter(Boolean).length;

  const clearAll = () => { setFilterEntity(''); setFilterFolder(''); setFilterTag(''); setFilterFrom(''); setFilterTo(''); };

  const selectStyle = { flex: 1, border: '1px solid var(--border)', borderRadius: 8, padding: '7px 10px', fontFamily: 'inherit', fontSize: 12, background: '#fff', color: 'var(--text)', outline: 'none' };
  const inputStyle = { flex: 1, border: '1px solid var(--border)', borderRadius: 8, padding: '7px 10px', fontFamily: 'inherit', fontSize: 12, background: '#fff', color: 'var(--text)', outline: 'none' };

  return (
    <div style={{ maxWidth: 720, margin: '0 auto', padding: '40px 24px 80px' }}>
      <h2 style={{ fontSize: 22, fontWeight: 500, letterSpacing: '-0.02em', marginBottom: 20 }}>Search</h2>

      {/* Search bar */}
      <div style={{ display: 'flex', gap: 8, marginBottom: 12 }}>
        <div style={{ flex: 1, display: 'flex', alignItems: 'center', gap: 8, background: '#fff', border: '1.5px solid var(--border)', borderRadius: 10, padding: '9px 14px' }}>
          <Icon name="search" size={15} color="var(--text3)"/>
          <input value={query} onChange={e => setQuery(e.target.value)} placeholder="Search entries…" autoFocus
            style={{ border: 'none', outline: 'none', flex: 1, fontFamily: 'inherit', fontSize: 14, background: 'transparent', color: 'var(--text)' }}/>
          {query && <span onClick={() => setQuery('')} style={{ cursor: 'pointer', color: 'var(--text3)', fontSize: 16, lineHeight: 1 }}>×</span>}
        </div>
        <button onClick={() => setFiltersOpen(o => !o)} style={{
          background: filtersOpen || hasFilters ? 'var(--accent-light)' : 'var(--bg2)',
          border: `1px solid ${filtersOpen || hasFilters ? 'var(--accent)' : 'var(--border)'}`,
          borderRadius: 10, padding: '9px 14px', cursor: 'pointer', fontFamily: 'inherit', fontSize: 13,
          color: hasFilters ? 'var(--accent)' : 'var(--text2)', display: 'flex', alignItems: 'center', gap: 6,
        }}>
          Filters {activeFilterCount > 0 && <span style={{ background: 'var(--accent)', color: '#fff', borderRadius: 99, width: 17, height: 17, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 10, fontWeight: 700 }}>{activeFilterCount}</span>}
        </button>
      </div>

      {/* Filter panel */}
      {filtersOpen && (
        <div style={{ background: '#fff', border: '1px solid var(--border)', borderRadius: 12, padding: 16, marginBottom: 16, display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
          <div>
            <label style={{ fontSize: 11, fontWeight: 600, color: 'var(--text3)', textTransform: 'uppercase', letterSpacing: '0.06em', display: 'block', marginBottom: 5 }}>Entity</label>
            <select value={filterEntity} onChange={e => setFilterEntity(e.target.value)} style={selectStyle}>
              <option value="">All entities</option>
              {allEntities.map(e => <option key={e} value={e}>{e}</option>)}
            </select>
          </div>
          <div>
            <label style={{ fontSize: 11, fontWeight: 600, color: 'var(--text3)', textTransform: 'uppercase', letterSpacing: '0.06em', display: 'block', marginBottom: 5 }}>Folder</label>
            <select value={filterFolder} onChange={e => setFilterFolder(e.target.value)} style={selectStyle}>
              <option value="">All folders</option>
              {allFolders.map(f => <option key={f} value={f}>{f}</option>)}
            </select>
          </div>
          <div>
            <label style={{ fontSize: 11, fontWeight: 600, color: 'var(--text3)', textTransform: 'uppercase', letterSpacing: '0.06em', display: 'block', marginBottom: 5 }}>Tag</label>
            <select value={filterTag} onChange={e => setFilterTag(e.target.value)} style={selectStyle}>
              <option value="">All tags</option>
              {allTags.map(t => <option key={t} value={t}>#{t}</option>)}
            </select>
          </div>
          <div>
            <label style={{ fontSize: 11, fontWeight: 600, color: 'var(--text3)', textTransform: 'uppercase', letterSpacing: '0.06em', display: 'block', marginBottom: 5 }}>Date range</label>
            <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
              <input type="date" value={filterFrom} onChange={e => setFilterFrom(e.target.value)} style={{ ...inputStyle, flex: 1 }}/>
              <span style={{ fontSize: 11, color: 'var(--text3)' }}>to</span>
              <input type="date" value={filterTo} onChange={e => setFilterTo(e.target.value)} style={{ ...inputStyle, flex: 1 }}/>
            </div>
          </div>
          {hasFilters && (
            <div style={{ gridColumn: '1/-1', display: 'flex', justifyContent: 'flex-end' }}>
              <button onClick={clearAll} style={{ background: 'none', border: 'none', color: 'var(--red)', fontSize: 12, cursor: 'pointer', fontFamily: 'inherit' }}>Clear all filters</button>
            </div>
          )}
        </div>
      )}

      {/* Active filter chips */}
      {hasFilters && !filtersOpen && (
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, marginBottom: 14 }}>
          {filterEntity && <Chip label={filterEntity} icon="entity" bg="var(--bg3)" onRemove={() => setFilterEntity('')} small/>}
          {filterFolder && <FolderChip path={filterFolder} small/>}
          {filterTag && <Chip label={`#${filterTag}`} icon="tag" bg="var(--bg3)" onRemove={() => setFilterTag('')} small/>}
          {filterFrom && <Chip label={`From ${filterFrom}`} icon="clock" bg="var(--amber-light)" color="var(--amber)" onRemove={() => setFilterFrom('')} small/>}
          {filterTo && <Chip label={`To ${filterTo}`} icon="clock" bg="var(--amber-light)" color="var(--amber)" onRemove={() => setFilterTo('')} small/>}
        </div>
      )}

      {/* Results */}
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
        <span style={{ fontSize: 12, color: 'var(--text3)' }}>{results.length} {results.length === 1 ? 'result' : 'results'}</span>
        {(query || hasFilters) && <span style={{ fontSize: 12, color: 'var(--text3)' }}>sorted by date</span>}
      </div>
      <div style={{ display: 'grid', gap: 8 }}>
        {results.length === 0 && <div style={{ textAlign: 'center', padding: '40px 0', color: 'var(--text3)', fontSize: 14 }}>No entries match your search.</div>}
        {[...results].sort((a, b) => b.timestamp > a.timestamp ? 1 : -1).map(e => <EntryCard key={e.id} entry={e} onClick={onSelect} overdue={isOverdue(e)}/>)}
      </div>
    </div>
  );
};

// ── SETTINGS VIEW ────────────────────────────────────────────────────────────
const SettingsView = ({ entries }) => {
  const [tab, setTab] = useState('entities');

  // Derive masters from entries
  const allEntities = [...new Set(entries.filter(e => e.entity).map(e => e.entity))];
  const allTags = [...new Set(entries.flatMap(e => e.tags))];
  const allFolders = [...new Set(entries.filter(e => e.folder).map(e => e.folder))];

  const [entities, setEntities] = useState(allEntities);
  const [tags, setTags] = useState(allTags);
  const [folders, setFolders] = useState(allFolders);
  const [newVal, setNewVal] = useState('');
  const [editId, setEditId] = useState(null);
  const [editVal, setEditVal] = useState('');

  const tabs = [
    { id: 'entities', label: 'Entities', icon: 'entity', list: entities, setList: setEntities, placeholder: 'Add entity (e.g. Acme Corp)' },
    { id: 'tags', label: 'Tags', icon: 'tag', list: tags, setList: setTags, placeholder: 'Add tag (e.g. invoice)' },
    { id: 'folders', label: 'Folders', icon: 'folder', list: folders, setList: setFolders, placeholder: 'Add folder (e.g. Clients)' },
  ];
  const active = tabs.find(t => t.id === tab);

  const addItem = () => {
    const v = newVal.trim();
    if (!v || active.list.includes(v)) return;
    active.setList(prev => [...prev, v]);
    setNewVal('');
  };

  const deleteItem = (item) => active.setList(prev => prev.filter(x => x !== item));

  const saveEdit = (old) => {
    const v = editVal.trim();
    if (!v) return;
    active.setList(prev => prev.map(x => x === old ? v : x));
    setEditId(null); setEditVal('');
  };

  return (
    <div style={{ maxWidth: 640, margin: '0 auto', padding: '40px 24px 80px' }}>
      <h2 style={{ fontSize: 22, fontWeight: 500, letterSpacing: '-0.02em', marginBottom: 4 }}>Settings</h2>
      <p style={{ fontSize: 13, color: 'var(--text3)', marginBottom: 28 }}>Manage master lists used across your journal entries.</p>

      {/* Tab bar */}
      <div style={{ display: 'flex', gap: 4, marginBottom: 24, background: 'var(--bg2)', borderRadius: 10, padding: 4, width: 'fit-content' }}>
        {tabs.map(t => (
          <button key={t.id} onClick={() => { setTab(t.id); setNewVal(''); setEditId(null); }} style={{
            display: 'flex', alignItems: 'center', gap: 6,
            padding: '6px 14px', borderRadius: 7, border: 'none', cursor: 'pointer',
            fontFamily: 'inherit', fontSize: 13, fontWeight: tab === t.id ? 500 : 400,
            background: tab === t.id ? '#fff' : 'transparent',
            color: tab === t.id ? 'var(--text)' : 'var(--text2)',
            boxShadow: tab === t.id ? '0 1px 4px rgba(0,0,0,0.08)' : 'none',
            transition: 'all 0.15s',
          }}>
            <Icon name={t.icon} size={13} color={tab === t.id ? 'var(--accent)' : 'var(--text3)'}/>
            {t.label}
            <span style={{ fontSize: 11, fontWeight: 600, background: tab === t.id ? 'var(--accent-light)' : 'var(--bg3)', color: tab === t.id ? 'var(--accent)' : 'var(--text3)', borderRadius: 99, padding: '0 6px', lineHeight: 1.8 }}>{t.list.length}</span>
          </button>
        ))}
      </div>

      {/* Master list */}
      <div style={{ background: '#fff', border: '1px solid var(--border)', borderRadius: 12, overflow: 'hidden' }}>
        {/* Add new */}
        <div style={{ display: 'flex', gap: 8, padding: '12px 14px', borderBottom: '1px solid var(--border)', background: 'var(--bg2)' }}>
          <input
            value={newVal} onChange={e => setNewVal(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && addItem()}
            placeholder={active.placeholder}
            style={{ flex: 1, border: '1px solid var(--border)', borderRadius: 7, padding: '7px 11px', fontFamily: 'inherit', fontSize: 13, outline: 'none', background: '#fff', color: 'var(--text)' }}
          />
          <button onClick={addItem} style={{ background: 'var(--accent)', color: '#fff', border: 'none', borderRadius: 7, padding: '7px 14px', fontFamily: 'inherit', fontSize: 13, fontWeight: 500, cursor: 'pointer', whiteSpace: 'nowrap' }}>
            + Add
          </button>
        </div>

        {/* List items */}
        {active.list.length === 0 && (
          <div style={{ padding: '24px 16px', textAlign: 'center', color: 'var(--text3)', fontSize: 13 }}>No {active.label.toLowerCase()} yet. Add one above.</div>
        )}
        {active.list.map((item, i) => (
          <div key={item} style={{
            display: 'flex', alignItems: 'center', gap: 10, padding: '11px 14px',
            borderBottom: i < active.list.length - 1 ? '1px solid var(--border)' : 'none',
          }}>
            <div style={{ width: 28, height: 28, borderRadius: 7, background: 'var(--accent-light)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
              <Icon name={active.icon} size={13} color="var(--accent)"/>
            </div>

            {editId === item ? (
              <>
                <input autoFocus value={editVal} onChange={e => setEditVal(e.target.value)} onKeyDown={e => { if (e.key === 'Enter') saveEdit(item); if (e.key === 'Escape') setEditId(null); }}
                  style={{ flex: 1, border: '1.5px solid var(--accent)', borderRadius: 6, padding: '4px 9px', fontFamily: 'inherit', fontSize: 13, outline: 'none' }}/>
                <button onClick={() => saveEdit(item)} style={{ background: 'var(--green-light)', color: 'var(--green)', border: 'none', borderRadius: 6, padding: '4px 10px', fontFamily: 'inherit', fontSize: 12, fontWeight: 500, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 4 }}>
                  <Icon name="check" size={12} color="var(--green)"/>Save
                </button>
                <button onClick={() => setEditId(null)} style={{ background: 'var(--bg2)', color: 'var(--text2)', border: '1px solid var(--border)', borderRadius: 6, padding: '4px 10px', fontFamily: 'inherit', fontSize: 12, cursor: 'pointer' }}>Cancel</button>
              </>
            ) : (
              <>
                <span style={{ flex: 1, fontSize: 14, color: 'var(--text)' }}>
                  {tab === 'tags' ? `#${item}` : item}
                </span>
                <span style={{ fontSize: 11, color: 'var(--text3)' }}>
                  {tab === 'entities' && `${entries.filter(e => e.entity === item).length} entries`}
                  {tab === 'tags' && `${entries.filter(e => e.tags.includes(item)).length} entries`}
                  {tab === 'folders' && `${entries.filter(e => e.folder === item).length} entries`}
                </span>
                <button onClick={() => { setEditId(item); setEditVal(item); }} style={{ background: 'none', border: '1px solid var(--border)', borderRadius: 6, padding: '4px 10px', fontFamily: 'inherit', fontSize: 12, color: 'var(--text2)', cursor: 'pointer' }}>Edit</button>
                <button onClick={() => deleteItem(item)} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--text3)', padding: 4, borderRadius: 6, display: 'flex' }}
                  onMouseEnter={e => e.currentTarget.style.color = 'var(--red)'}
                  onMouseLeave={e => e.currentTarget.style.color = 'var(--text3)'}>
                  <Icon name="trash" size={14} color="currentColor"/>
                </button>
              </>
            )}
          </div>
        ))}
      </div>
    </div>
  );
};

// ── APP SHELL ─────────────────────────────────────────────────────────────────
const App = () => {
  const [entries, setEntries] = useState(() => {
    try {
      const s = localStorage.getItem('jp_entries');
      if (s) {
        const parsed = JSON.parse(s);
        // Version check: if no entry has a sub-folder path, discard stale cache
        const hasSubFolders = parsed.some(e => e.folder && e.folder.includes('/'));
        if (hasSubFolders) return parsed;
      }
    } catch {}
    localStorage.removeItem('jp_entries');
    return SEED_ENTRIES;
  });
  const [view, setView] = useState(() => localStorage.getItem('jp_view') || 'home');
  const [selectedEntry, setSelectedEntry] = useState(null);
  const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
  const [addFolderEntry, setAddFolderEntry] = useState(null);
  const [folderInput, setFolderInput] = useState('');
  const [activeTimer, setActiveTimer] = useState(null); // { entryId, startedAt, baseElapsed }

  const handleTimerToggle = (entry) => {
    if (activeTimer && activeTimer.entryId === entry.id) {
      // Stop timer
      setActiveTimer(null);
    } else {
      // Start new timer (stops any existing)
      setActiveTimer({ entryId: entry.id, startedAt: Date.now(), baseElapsed: 0 });
    }
  };

  const handleTimerStop = () => setActiveTimer(null);

  useEffect(() => { localStorage.setItem('jp_entries', JSON.stringify(entries)); }, [entries]);
  useEffect(() => { localStorage.setItem('jp_view', view); }, [view]);

  const addEntry = (entry) => setEntries(prev => [entry, ...prev]);
  const updateEntry = (updated) => setEntries(prev => prev.map(e => e.id === updated.id ? updated : e));

  // Move folder: rename all entries whose folder starts with oldPath
  const moveFolder = (oldPath, destParent) => {
    const oldName = oldPath.split('/').pop();
    const newPath = destParent ? `${destParent}/${oldName}` : oldName;
    setEntries(prev => prev.map(e => {
      if (!e.folder) return e;
      if (e.folder === oldPath) return { ...e, folder: newPath };
      if (e.folder.startsWith(oldPath + '/')) return { ...e, folder: newPath + e.folder.slice(oldPath.length) };
      return e;
    }));
  };

  const handleAddFolder = (entry) => { setAddFolderEntry(entry); setFolderInput(''); };
  const confirmFolder = () => {
    if (folderInput.trim()) updateEntry({ ...addFolderEntry, folder: folderInput.trim() });
    setAddFolderEntry(null);
  };

  // Tweaks
  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') document.getElementById('tweaks-panel').classList.add('visible');
      if (e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaks-panel').classList.remove('visible');
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    // Tweak controls
    const sidebarEl = document.getElementById('tw-sidebar');
    const fontsizeEl = document.getElementById('tw-fontsize');
    if (sidebarEl) sidebarEl.addEventListener('change', e => setSidebarCollapsed(e.target.value === 'collapsed'));
    if (fontsizeEl) fontsizeEl.addEventListener('input', e => { document.body.style.fontSize = e.target.value + 'px'; window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { fontSize: +e.target.value } }, '*'); });
    return () => window.removeEventListener('message', handler);
  }, []);

  // Determine active view content
  const folderName = view.startsWith('folder:') ? view.split(':')[1] : null;

  const renderView = () => {
    if (selectedEntry) return <EntryView entry={selectedEntry} onBack={() => setSelectedEntry(null)} onUpdate={e => { updateEntry(e); setSelectedEntry(e); }} activeTimer={activeTimer} onTimerToggle={handleTimerToggle}/>;
    if (view === 'home') return <HomeView entries={entries} onAdd={addEntry} onSelect={setSelectedEntry} activeTimer={activeTimer} onTimerToggle={handleTimerToggle}/>;
    if (view === 'inbox') return <InboxView entries={entries} onSelect={setSelectedEntry} onAddFolder={handleAddFolder} activeTimer={activeTimer} onTimerToggle={handleTimerToggle}/>;
    if (view === 'search') return <SearchView entries={entries} onSelect={setSelectedEntry}/>;
    if (view === 'calendar') return <CalendarView entries={entries} onSelect={setSelectedEntry}/>;
    if (view === 'folders') return <FolderNavView entries={entries} setView={setView} onMoveFolder={moveFolder}/>;
    if (view === 'settings') return <SettingsView entries={entries}/>;
    if (folderName) return <FolderView folderName={folderName} entries={entries} onSelect={setSelectedEntry} activeTimer={activeTimer} onTimerToggle={handleTimerToggle}/>;
  };

  return (
    <div style={{ display: 'flex', height: '100vh', overflow: 'hidden' }}>
      <Sidebar view={selectedEntry ? null : view} setView={(v) => { setSelectedEntry(null); setView(v); }} entries={entries} collapsed={sidebarCollapsed} setCollapsed={setSidebarCollapsed}/>
      <main style={{ flex: 1, overflow: 'auto', position: 'relative' }}>
        {renderView()}
      </main>

      {/* Floating timer */}
      {activeTimer && (
        <FloatingTimer
          timer={activeTimer}
          entry={entries.find(e => e.id === activeTimer.entryId)}
          onStop={handleTimerStop}
        />
      )}

      {/* Add folder modal */}
      {addFolderEntry && (
        <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.25)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 1000 }} onClick={() => setAddFolderEntry(null)}>
          <div onClick={e => e.stopPropagation()} style={{ background: '#fff', borderRadius: 14, padding: 24, width: 340, boxShadow: '0 16px 48px rgba(0,0,0,0.15)' }}>
            <h3 style={{ fontSize: 16, fontWeight: 500, marginBottom: 6 }}>Add to folder</h3>
            <p style={{ fontSize: 13, color: 'var(--text2)', marginBottom: 16, lineHeight: 1.5 }}>{addFolderEntry.text.slice(0, 80)}…</p>
            <input value={folderInput} onChange={e => setFolderInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && confirmFolder()} placeholder="Folder name (e.g. Clients)" style={{ ...fieldInputStyle, width: '100%', marginBottom: 14, padding: '8px 12px', fontSize: 14 }} autoFocus/>
            <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end' }}>
              <button onClick={() => setAddFolderEntry(null)} style={secondaryBtn}>Cancel</button>
              <button onClick={confirmFolder} style={primaryBtn}>Add folder</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
